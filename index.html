<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>증거 - 휴대폰</title>
<style>
  /* ============================================
     데이터 영역 - 여기만 수정하면 됩니다!
     아래 자바스크립트 영역의 chatData 변수를
     원하는 대화 내용으로 바꾸세요.
     ============================================ */

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #2a2a2e;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", "맑은 고딕", sans-serif;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 폰 프레임 */
  .phone {
    position: relative;
    width: 390px;
    height: 100vh;
    max-height: 844px;
    background: #000;
    border-radius: 0;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.5);
  }

  @media (min-width: 600px) {
    .phone {
      border-radius: 48px;
      border: 12px solid #1a1a1a;
      height: 844px;
    }
    .phone::before {
      content: "";
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      width: 110px;
      height: 30px;
      background: #000;
      border-radius: 20px;
      z-index: 100;
    }
  }

  /* 화면 영역 */
  .screen {
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    background: #fff;
  }

  /* 상태바 */
  .statusbar {
    height: 44px;
    padding: 0 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 15px;
    font-weight: 600;
    color: #000;
    z-index: 10;
    position: relative;
  }
  .statusbar.dark { color: #fff; }
  .statusbar .right { display: flex; gap: 6px; align-items: center; }
  .statusbar svg { display: block; }

  /* ===========================
     1. 잠금화면
     =========================== */
  .lockscreen {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
    display: flex;
    flex-direction: column;
    z-index: 50;
    transition: opacity 0.4s, transform 0.4s;
  }
  .lockscreen.hidden {
    opacity: 0;
    transform: translateY(-100%);
    pointer-events: none;
  }
  .lock-time {
    text-align: center;
    color: #fff;
    margin-top: 60px;
    margin-bottom: 8px;
  }
  .lock-time .time {
    font-size: 84px;
    font-weight: 200;
    letter-spacing: -2px;
    line-height: 1;
  }
  .lock-time .date {
    font-size: 16px;
    font-weight: 500;
    margin-top: 8px;
    opacity: 0.9;
  }
  .lock-prompt {
    text-align: center;
    color: rgba(255,255,255,0.7);
    font-size: 14px;
    margin-top: 24px;
  }
  .pin-display {
    display: flex;
    justify-content: center;
    gap: 14px;
    margin-top: 40px;
    margin-bottom: 36px;
    height: 18px;
    flex-wrap: nowrap;
  }
  .pin-dot {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.6);
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .pin-dot.filled { background: #fff; border-color: #fff; }
  .pin-display.shake { animation: shake 0.4s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%, 60% { transform: translateX(-8px); }
    40%, 80% { transform: translateX(8px); }
  }
  .keypad {
    flex: 1;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 24px;
    padding: 0 40px 30px;
    align-content: end;
  }
  .key {
    height: 70px;
    width: 70px;
    margin: 0 auto;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 32px;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .key:active { background: rgba(255,255,255,0.35); }
  .key.empty { background: transparent; cursor: default; }
  .key.delete {
    background: transparent;
    font-size: 16px;
    font-weight: 500;
  }
  .key.delete:active { background: rgba(255,255,255,0.15); }
  .lock-hint {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 12px;
    padding-bottom: 12px;
  }

  /* 잠김 상태 */
  .keypad.locked {
    opacity: 0.3;
    pointer-events: none;
  }
  .lock-prompt.warning {
    color: #ff6b6b;
    font-weight: 500;
  }
  .lockout-timer {
    text-align: center;
    color: #ff6b6b;
    font-size: 13px;
    font-weight: 500;
    margin-top: 6px;
    letter-spacing: 0.5px;
  }
  .attempt-counter {
    text-align: center;
    color: rgba(255,255,255,0.5);
    font-size: 11px;
    margin-top: 4px;
    min-height: 14px;
  }
  .attempt-counter.danger {
    color: #ff9f9f;
  }

  /* ===========================
     2. 카톡 채팅 목록
     =========================== */
  .chatlist {
    position: absolute;
    inset: 0;
    background: #b2c7d9;
    display: flex;
    flex-direction: column;
    z-index: 20;
    transition: transform 0.25s;
  }
  .chatlist.pushed { transform: translateX(-30%); }

  .chatlist-header {
    padding: 6px 18px 14px;
    background: #b2c7d9;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .chatlist-title {
    font-size: 22px;
    font-weight: 700;
    color: #000;
    letter-spacing: -0.5px;
  }
  .chatlist-icons {
    display: flex;
    gap: 16px;
    color: #000;
  }

  .chat-search {
    margin: 0 14px 10px;
    background: rgba(0,0,0,0.08);
    border-radius: 10px;
    padding: 9px 14px;
    color: rgba(0,0,0,0.45);
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chat-rooms {
    background: #b2c7d9;
  }

  .chat-room {
    display: flex;
    padding: 11px 16px;
    gap: 12px;
    cursor: pointer;
    align-items: center;
    transition: background 0.1s;
  }
  .chat-room:active { background: rgba(0,0,0,0.05); }

  .avatar {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    background: #fff;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    font-weight: 600;
    color: #888;
    overflow: hidden;
  }
  .avatar.c1 { background: linear-gradient(135deg, #fdcb6e, #e17055); color: #fff; }
  .avatar.c2 { background: linear-gradient(135deg, #74b9ff, #0984e3); color: #fff; }
  .avatar.c3 { background: linear-gradient(135deg, #a29bfe, #6c5ce7); color: #fff; }
  .avatar.c4 { background: linear-gradient(135deg, #55efc4, #00b894); color: #fff; }
  .avatar.c5 { background: linear-gradient(135deg, #fab1a0, #e84393); color: #fff; }
  .avatar.c6 { background: linear-gradient(135deg, #b2bec3, #636e72); color: #fff; }

  /* 이미지 아바타 */
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: inherit;
  }
  .avatar.has-image {
    background: #fff;
  }

  .chat-info {
    flex: 1;
    min-width: 0;
  }
  .chat-info-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 3px;
  }
  .chat-name {
    font-size: 15px;
    font-weight: 600;
    color: #000;
  }
  .chat-time {
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    flex-shrink: 0;
    margin-left: 6px;
  }
  .chat-preview {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }
  .chat-last {
    font-size: 13px;
    color: rgba(0,0,0,0.55);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex: 1;
  }
  .unread {
    background: #ff6f6f;
    color: #fff;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }

  /* 하단 탭바 */
  .tabbar {
    height: 50px;
    background: #fff;
    border-top: 1px solid rgba(0,0,0,0.06);
    display: flex;
    justify-content: space-around;
    align-items: center;
  }
  .tab {
    flex: 1;
    text-align: center;
    color: rgba(0,0,0,0.3);
    font-size: 11px;
  }
  .tab.active { color: #000; }
  .tab .icon {
    font-size: 22px;
    margin-bottom: 2px;
  }
  .tab { cursor: pointer; }

  /* ===========================
     탭 화면 공통
     =========================== */
  .tab-page {
    flex: 1;
    overflow-y: auto;
    background: #b2c7d9;
    display: none;
  }
  .tab-page.active {
    display: block;
  }

  /* 친구 목록 페이지 */
  .friend-section-title {
    font-size: 12px;
    color: rgba(0,0,0,0.5);
    padding: 10px 18px 6px;
    font-weight: 500;
  }
  .friend-row {
    display: flex;
    padding: 9px 16px;
    gap: 12px;
    align-items: center;
    cursor: pointer;
    transition: background 0.1s;
  }
  .friend-row:active { background: rgba(0,0,0,0.05); }
  .friend-row .avatar {
    width: 44px;
    height: 44px;
    font-size: 20px;
  }
  .friend-info { flex: 1; min-width: 0; }
  .friend-name {
    font-size: 14.5px;
    font-weight: 600;
    color: #000;
    margin-bottom: 2px;
  }
  .friend-status {
    font-size: 12px;
    color: rgba(0,0,0,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* 내 프로필 (친구 목록 상단) */
  .my-profile {
    display: flex;
    padding: 14px 16px;
    gap: 12px;
    align-items: center;
    border-bottom: 1px solid rgba(0,0,0,0.06);
    background: rgba(255,255,255,0.3);
  }
  .my-profile .avatar {
    width: 52px;
    height: 52px;
    font-size: 24px;
    border-radius: 16px;
  }
  .my-profile .friend-name { font-size: 15.5px; }

  /* 오픈채팅 페이지 */
  .openchat-banner {
    margin: 12px 14px;
    padding: 14px 16px;
    background: linear-gradient(135deg, #ffd56b, #ff9c5b);
    border-radius: 14px;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    box-shadow: 0 4px 12px rgba(255,156,91,0.25);
  }
  .openchat-banner .title {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 3px;
  }
  .openchat-section-title {
    font-size: 12px;
    color: rgba(0,0,0,0.5);
    padding: 10px 18px 6px;
    font-weight: 500;
  }
  .openchat-room {
    display: flex;
    padding: 11px 16px;
    gap: 12px;
    cursor: pointer;
    align-items: center;
    transition: background 0.1s;
  }
  .openchat-room:active { background: rgba(0,0,0,0.05); }
  .openchat-room .avatar {
    width: 48px;
    height: 48px;
  }
  .openchat-info { flex: 1; min-width: 0; }
  .openchat-name {
    font-size: 14.5px;
    font-weight: 600;
    color: #000;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .openchat-tag {
    background: #ff9c5b;
    color: #fff;
    font-size: 9px;
    font-weight: 600;
    padding: 1px 5px;
    border-radius: 4px;
  }
  .openchat-desc {
    font-size: 12px;
    color: rgba(0,0,0,0.5);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .openchat-meta {
    font-size: 11px;
    color: rgba(0,0,0,0.4);
    margin-top: 2px;
  }

  /* ===========================
     3. 채팅방
     =========================== */
  .chatroom {
    position: absolute;
    inset: 0;
    background: #b2c7d9;
    display: flex;
    flex-direction: column;
    z-index: 30;
    transform: translateX(100%);
    transition: transform 0.25s ease-out;
  }
  .chatroom.open { transform: translateX(0); }

  .chatroom-header {
    background: #b2c7d9;
    padding: 6px 12px 10px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .back-btn {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: #000;
    border-radius: 50%;
  }
  .back-btn:active { background: rgba(0,0,0,0.08); }
  .chatroom-title {
    flex: 1;
    font-size: 16px;
    font-weight: 600;
    color: #000;
    margin-left: 4px;
  }
  .header-icons {
    display: flex;
    gap: 8px;
    color: #000;
  }
  .header-icons > div {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .date-divider {
    text-align: center;
    margin: 14px 0 10px;
  }
  .date-divider span {
    background: rgba(0,0,0,0.25);
    color: #fff;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 12px;
  }

  /* 상대방 메시지 */
  .msg-row.them {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: flex-start;
  }
  .msg-row.them.continued { margin-top: 1px; }
  .msg-row.them .msg-avatar {
    width: 36px;
    height: 36px;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .msg-row.them.continued .msg-avatar { visibility: hidden; }
  .msg-content-wrap { flex: 1; min-width: 0; }
  .msg-sender {
    font-size: 12px;
    color: rgba(0,0,0,0.7);
    margin-bottom: 3px;
    margin-left: 2px;
  }
  .msg-row.them.continued .msg-sender { display: none; }
  .msg-bubble-wrap {
    display: flex;
    align-items: flex-end;
    gap: 4px;
  }
  .bubble {
    background: #fff;
    padding: 7px 11px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.4;
    color: #000;
    max-width: 240px;
    word-break: break-word;
    white-space: pre-wrap;
  }
  .msg-time {
    font-size: 10px;
    color: rgba(0,0,0,0.45);
    flex-shrink: 0;
    padding-bottom: 2px;
  }

  /* 내 메시지 */
  .msg-row.me {
    display: flex;
    justify-content: flex-end;
    gap: 4px;
    align-items: flex-end;
    margin-top: 4px;
  }
  .msg-row.me .bubble {
    background: #fef01b;
    color: #000;
  }

  /* 시스템 메시지 */
  .msg-system {
    text-align: center;
    margin: 10px 0;
  }
  .msg-system span {
    background: rgba(0,0,0,0.2);
    color: #fff;
    font-size: 11px;
    padding: 4px 12px;
    border-radius: 12px;
  }

  /* 채팅방 입력바 */
  .input-bar {
    padding: 8px 10px 10px;
    background: #fff;
    display: flex;
    align-items: center;
    gap: 8px;
    border-top: 1px solid rgba(0,0,0,0.05);
  }
  .input-bar .plus {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    justify-content: center;
    color: rgba(0,0,0,0.5);
    font-size: 18px;
    flex-shrink: 0;
  }
  .input-bar .input-fake {
    flex: 1;
    background: rgba(0,0,0,0.05);
    border-radius: 16px;
    padding: 7px 14px;
    color: rgba(0,0,0,0.3);
    font-size: 13px;
  }
  .input-bar .send-icons {
    display: flex;
    gap: 10px;
    color: rgba(0,0,0,0.5);
  }

  /* 스크롤바 숨기기 */
  .messages::-webkit-scrollbar,
  .chat-rooms::-webkit-scrollbar { display: none; }
  .messages, .chat-rooms { -ms-overflow-style: none; scrollbar-width: none; }

  /* 첨부 이미지 */
  .img-attachment {
    max-width: 220px;
    max-height: 280px;
    border-radius: 14px;
    display: block;
    cursor: pointer;
    object-fit: cover;
  }
  .img-attachment.placeholder {
    width: 200px;
    height: 150px;
    background: linear-gradient(135deg, #ddd, #999);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
  }

  /* 이미지를 포함한 메시지 버블 */
  .bubble.img-bubble {
    padding: 3px;
    background: #fff;
    overflow: hidden;
  }
  .msg-row.me .bubble.img-bubble {
    background: #fef01b;
  }

  /* 이미지 전체화면 뷰어 */
  .img-viewer {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.95);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .img-viewer.open {
    display: flex;
  }
  .img-viewer img {
    max-width: 95%;
    max-height: 80%;
    object-fit: contain;
  }
  .img-viewer-close {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 22px;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="screen">

    <!-- 잠금화면 -->
    <div class="lockscreen" id="lockscreen">
      <div class="statusbar dark">
        <span id="lockTopTime">9:41</span>
        <span class="right">
          <svg width="17" height="11" viewBox="0 0 17 11" fill="currentColor"><path d="M1 4.5l1-1c1.5-1.5 4-1.5 5.5 0l1 1M3 6.5l.5-.5c1-1 2.5-1 3.5 0l.5.5M5 8.5l.3-.3c.4-.4 1-.4 1.4 0l.3.3"/></svg>
          <svg width="22" height="11" viewBox="0 0 22 11" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="1" width="18" height="9" rx="2"/><rect x="2" y="2.5" width="15" height="6" rx="1" fill="currentColor"/><rect x="19.5" y="4" width="1.5" height="3" rx="0.5" fill="currentColor"/></svg>
        </span>
      </div>

      <div class="lock-time">
        <div class="time" id="lockTime">9:41</div>
        <div class="date" id="lockDate">월요일, 4월 28일</div>
      </div>

      <div class="lock-prompt" id="lockPrompt">암호 입력</div>

      <div class="pin-display" id="pinDisplay"></div>

      <div class="attempt-counter" id="attemptCounter"></div>

      <div class="keypad" id="keypad">
        <div class="key" data-num="1">1</div>
        <div class="key" data-num="2">2</div>
        <div class="key" data-num="3">3</div>
        <div class="key" data-num="4">4</div>
        <div class="key" data-num="5">5</div>
        <div class="key" data-num="6">6</div>
        <div class="key" data-num="7">7</div>
        <div class="key" data-num="8">8</div>
        <div class="key" data-num="9">9</div>
        <div class="key empty"></div>
        <div class="key" data-num="0">0</div>
        <div class="key delete" data-action="delete">지우기</div>
      </div>

      <div class="lock-hint">힌트: ❤️</div>
    </div>

    <!-- 채팅 목록 -->
    <div class="chatlist" id="chatlist">
      <div class="statusbar">

// 시계 업데이트
function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = String(now.getMinutes()).padStart(2, '0');
  const timeStr = `${h}:${m}`;
  const days = ['일','월','화','수','목','금','토'];
  const dateStr = `${days[now.getDay()]}요일, ${now.getMonth()+1}월 ${now.getDate()}일`;
  document.getElementById('lockTime').textContent = timeStr;
  document.getElementById('lockDate').textContent = dateStr;
  document.getElementById('lockTopTime').textContent = timeStr;
  document.getElementById('topTime').textContent = timeStr;
  document.getElementById('topTime2').textContent = timeStr;
}
updateClock();
setInterval(updateClock, 30000);

// 잠금화면 PIN 입력
let pinInput = "";
let failCount = 0;
let lockoutEndTime = 0;
let lockoutInterval = null;

const PIN_LENGTH = PASSWORD.length;

const pinDisplay = document.getElementById('pinDisplay');
const keypad = document.getElementById('keypad');
const lockPrompt = document.getElementById('lockPrompt');
const attemptCounter = document.getElementById('attemptCounter');

// PIN 점 동적 생성
for (let i = 0; i < PIN_LENGTH; i++) {
  const dot = document.createElement('div');
  dot.className = 'pin-dot';
  pinDisplay.appendChild(dot);
}
const pinDots = document.querySelectorAll('.pin-dot');

function updatePinDisplay() {
  pinDots.forEach((dot, i) => {
    dot.classList.toggle('filled', i < pinInput.length);
  });
}

function updateAttemptCounter() {
  const remaining = MAX_ATTEMPTS - failCount;
  if (failCount === 0) {
    attemptCounter.textContent = '';
    attemptCounter.classList.remove('danger');
  } else if (remaining > 0) {
    attemptCounter.textContent = `${remaining}번 더 시도할 수 있습니다`;
    attemptCounter.classList.toggle('danger', remaining <= 2);
  }
}

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}:${String(s).padStart(2, '0')}`;
}

function startLockout() {
  lockoutEndTime = Date.now() + LOCKOUT_SECONDS * 1000;
  keypad.classList.add('locked');
  pinInput = "";
  updatePinDisplay();

  function tick() {
    const remaining = Math.ceil((lockoutEndTime - Date.now()) / 1000);
    if (remaining <= 0) {
      // 잠금 해제
      clearInterval(lockoutInterval);
      lockoutInterval = null;
      keypad.classList.remove('locked');
      lockPrompt.textContent = '암호 입력';
      lockPrompt.classList.remove('warning');
      attemptCounter.textContent = '';
      attemptCounter.classList.remove('danger');
      failCount = 0;
    } else {
      lockPrompt.innerHTML = `iPhone을 사용할 수 없음`;
      lockPrompt.classList.add('warning');
      attemptCounter.textContent = `${formatTime(remaining)} 후에 다시 시도하세요`;
      attemptCounter.classList.add('danger');
    }
  }

  tick();
  lockoutInterval = setInterval(tick, 1000);
}

keypad.addEventListener('click', (e) => {
  // 잠금 상태면 입력 무시
  if (keypad.classList.contains('locked')) return;

  const key = e.target.closest('.key');
  if (!key) return;

  if (key.dataset.action === 'delete') {
    pinInput = pinInput.slice(0, -1);
    updatePinDisplay();
    return;
  }

  if (key.dataset.num !== undefined && pinInput.length < PIN_LENGTH) {
    pinInput += key.dataset.num;
    updatePinDisplay();

    if (pinInput.length === PIN_LENGTH) {
      setTimeout(() => {
        if (pinInput === PASSWORD) {
          // 성공
          document.getElementById('lockscreen').classList.add('hidden');
          failCount = 0;
        } else {
          // 실패
          failCount++;
          pinDisplay.classList.add('shake');
          setTimeout(() => {
            pinDisplay.classList.remove('shake');
            pinInput = "";
            updatePinDisplay();

            if (failCount >= MAX_ATTEMPTS) {
              startLockout();
            } else {
              updateAttemptCounter();
            }
          }, 400);
        }
      }, 150);
    }
  }
});

const chatroomEl = document.getElementById('chatroom');
const messagesEl = document.getElementById('messages');
const roomTitleEl = document.getElementById('roomTitle');

function openRoom(room) {
  roomTitleEl.textContent = room.name;
  // 오픈채팅방은 헤더에 멤버수 표시
  if (room.memberCount) {
    roomTitleEl.textContent = `${room.name} ${room.memberCount}`;
  }
  messagesEl.innerHTML = '';

  room.messages.forEach(msg => {
    if (msg.type === 'date') {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.innerHTML = `<span>${msg.text}</span>`;
      messagesEl.appendChild(div);
    } else if (msg.type === 'system') {
      const div = document.createElement('div');
      div.className = 'msg-system';
      div.innerHTML = `<span>${msg.text}</span>`;
      messagesEl.appendChild(div);
    } else if (msg.type === 'them') {
      const div = document.createElement('div');
      div.className = 'msg-row them' + (msg.continued ? ' continued' : '');

      // 단톡방이면 멤버별 아바타 사용, 아니면 방 아바타 사용
      let avatarColor = room.avatarColor;
      let avatarText = room.avatarText;
      let avatarImage = null;
      if (room.members && msg.sender && room.members[msg.sender]) {
        avatarColor = room.members[msg.sender].color;
        avatarText = room.members[msg.sender].text;
        avatarImage = room.members[msg.sender].image;
      }

      // 아바타 HTML 만들기 (이미지가 있으면 img 태그, 없으면 글자)
      let avatarHtml = '';
      if (avatarImage) {
        avatarHtml = `<div class="avatar msg-avatar has-image"><img src="${avatarImage}" alt=""></div>`;
      } else {
        avatarHtml = `<div class="avatar msg-avatar ${avatarColor}">${avatarText}</div>`;
      }

      let bubbleHtml = '';
      if (msg.image) {
        bubbleHtml = `<div class="bubble img-bubble"><img class="img-attachment" src="${msg.image}" data-fullsize="${msg.image}" alt=""></div>`;
      } else {
        bubbleHtml = `<div class="bubble">${msg.text}</div>`;
      }

      div.innerHTML = `
        ${avatarHtml}
        <div class="msg-content-wrap">
          <div class="msg-sender">${msg.sender || room.name}</div>
          <div class="msg-bubble-wrap">
            ${bubbleHtml}
            <div class="msg-time">${msg.time}</div>
          </div>
        </div>
      `;
      messagesEl.appendChild(div);
    } else if (msg.type === 'me') {
      const div = document.createElement('div');
      div.className = 'msg-row me';

      let bubbleHtml = '';
      if (msg.image) {
        bubbleHtml = `<div class="bubble img-bubble"><img class="img-attachment" src="${msg.image}" data-fullsize="${msg.image}" alt=""></div>`;
      } else {
        bubbleHtml = `<div class="bubble">${msg.text}</div>`;
      }

      div.innerHTML = `
        <div class="msg-time">${msg.time}</div>
        ${bubbleHtml}
      `;
      messagesEl.appendChild(div);
    }
  });

  chatroomEl.classList.add('open');
  setTimeout(() => messagesEl.scrollTop = 0, 50);
}

document.getElementById('backBtn').addEventListener('click', () => {
  chatroomEl.classList.remove('open');
});

// 이미지 클릭 시 전체화면 보기
const imgViewer = document.getElementById('imgViewer');
const imgViewerImg = document.getElementById('imgViewerImg');

messagesEl.addEventListener('click', (e) => {
  if (e.target.classList.contains('img-attachment')) {
    imgViewerImg.src = e.target.dataset.fullsize;
    imgViewer.classList.add('open');
  }
});

document.getElementById('imgViewerClose').addEventListener('click', () => {
  imgViewer.classList.remove('open');
});

imgViewer.addEventListener('click', (e) => {
  if (e.target === imgViewer) {
    imgViewer.classList.remove('open');
  }
});
</script>

</body>
</html>
